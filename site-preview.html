<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站预览生成 — PORTFOLIO</title>
  <meta name="description" content="输入网站关键词，即时生成落地页风格预览 mockup。">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asul&family=Chakra+Petch:wght@400;500&family=DM+Serif+Display&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/site-preview.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-header__logo">PORTFOLIO</a>
    <nav class="site-header__nav" aria-label="Main">
      <a href="works-index.html" data-flicker>INDEX</a>
      <a href="about.html" data-flicker>ABOUT</a>
      <a href="about.html"><img src="assets/images/avatar.png" alt="Profile" class="site-header__avatar" width="55" height="55"></a>
    </nav>
    <button class="hamburger" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </header>
  <nav class="mobile-nav" aria-label="Mobile">
    <a href="works-index.html">INDEX</a>
    <a href="about.html">ABOUT</a>
  </nav>

  <main class="site-preview-page">
    <div class="site-preview-page__intro">
      <h1 class="site-preview-page__title">网站关键词预览</h1>
      <p class="site-preview-page__desc">
        输入行业、风格、颜色、布局等关键词（用空格或逗号分隔），系统会解析并生成对应的落地页预览。支持 URL 参数：<code>?q=科技,简约,蓝色</code>
      </p>
    </div>

    <div class="site-preview-layout">
      <aside class="site-preview-panel">
        <label for="keyword-input">网站关键词</label>
        <textarea id="keyword-input" placeholder="例如：科技 简约 蓝色 企业官网&#10;或：餐饮 暖色 大图 活泼"></textarea>

        <p class="sr-only" id="chip-label">快捷标签</p>
        <div class="site-preview-chips" role="group" aria-labelledby="chip-label">
          <button type="button" class="site-preview-chip" data-kw="科技">科技</button>
          <button type="button" class="site-preview-chip" data-kw="电商">电商</button>
          <button type="button" class="site-preview-chip" data-kw="餐饮">餐饮</button>
          <button type="button" class="site-preview-chip" data-kw="web3">Web3</button>
          <button type="button" class="site-preview-chip" data-kw="简约">简约</button>
          <button type="button" class="site-preview-chip" data-kw="暗色">暗色</button>
          <button type="button" class="site-preview-chip" data-kw="蓝色">蓝色</button>
          <button type="button" class="site-preview-chip" data-kw="卡片">卡片</button>
          <button type="button" class="site-preview-chip" data-kw="分栏">分栏</button>
          <button type="button" class="site-preview-chip" data-kw="高端">高端</button>
        </div>

        <div class="site-preview-actions">
          <button type="button" class="site-preview-btn site-preview-btn--primary" id="btn-generate">生成预览</button>
          <button type="button" class="site-preview-btn site-preview-btn--ghost" id="btn-reset">清空</button>
        </div>

        <dl class="site-preview-meta" id="preview-meta"></dl>
      </aside>

      <section class="site-preview-stage" aria-label="预览区域">
        <div class="site-preview-browser">
          <div class="site-preview-browser__bar">
            <div class="site-preview-browser__dots" aria-hidden="true"><span></span><span></span><span></span></div>
            <div class="site-preview-browser__url" id="preview-url">https://preview.local/</div>
          </div>
          <div class="site-preview-frame" id="preview-frame">
            <div id="preview-mock-root" class="site-preview-mock-wrap"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/site-preview.js"></script>
</body>
</html>
