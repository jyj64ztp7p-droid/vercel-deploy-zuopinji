<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works Index — PORTFOLIO</title>
  <meta name="description" content="Full works index — web3, app, web &amp; large-screen, and h5 projects from 2022–2026.">
  <meta property="og:title" content="Works Index — PORTFOLIO">
  <meta property="og:description" content="Browse web3, app, web, and h5 design work by year.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/index-web3-nft-hero.png">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asul&family=Chakra+Petch:wght@400;500&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">

</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-header__logo">PORTFOLIO</a>
    <div class="site-header__tools">
      <div class="music-player" data-music-player>
        <button type="button" class="music-player__toggle" aria-label="Play music">
          <span class="music-player__icon music-player__icon--play" aria-hidden="true">
            <img src="assets/images/play-icon.svg" alt="" width="15" height="15">
          </span>
          <span class="music-player__icon music-player__icon--pause" aria-hidden="true"></span>
        </button>
        <img src="assets/images/music-cover.png" alt="" class="music-player__cover" width="51" height="51">
        <div class="music-player__marquee" aria-label="Now playing: elephant survival">
          <div class="music-player__marquee-track">
            <span>elephant survival</span>
            <span aria-hidden="true">elephant survival</span>
          </div>
        </div>
      </div>
    </div>
    <nav class="site-header__nav" aria-label="Main">
      <a href="works-index.html" data-flicker>INDEX</a>
      <a href="about.html" data-flicker>ABOUT</a>
      <a href="about.html"><img src="assets/images/avatar.png" alt="Profile" class="site-header__avatar" width="55" height="55"></a>
    </nav>
    <button class="hamburger" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </header>
  <nav class="mobile-nav" aria-label="Mobile">
    <a href="works-index.html">INDEX</a>
    <a href="about.html">ABOUT</a>
  </nav>
  <audio id="bgm" loop preload="none" src="assets/audio/bgm.mp3"></audio>

  <main class="works-page">

        <span>2025_2026</span>
      </div>
      <div class="works-scroll" data-gallery="web3">

        <div class="works-scroll__item"><img src="assets/images/index-web3-home2.png" alt="Home 2" loading="lazy"></div>
        <div class="works-scroll__item"><img src="assets/images/index-web3-party.png" alt="Player party" loading="lazy"></div>
        <div class="works-scroll__item"><img src="assets/images/index-web3-roadmap.png" alt="Roadmap" loading="lazy"></div>
        <div class="works-scroll__item"><img src="assets/images/index-web3-nft-hero.png" alt="NFT hero" loading="lazy"></div>

        <div class="works-scroll__item"><img src="assets/images/index-web3-earn.png" alt="Earn" loading="lazy"></div>
        <div class="works-scroll__item"><img src="assets/images/index-web3-frame.png" alt="Frame" loading="lazy"></div>

        <div class="works-scroll__item"><img src="assets/images/index-app-shop.png" alt="Shop" loading="lazy"></div>

      <div class="works-section__head">
        <h2 id="h5-heading">h5</h2>
        <span>2022</span>
      </div>
      <div class="works-scroll works-scroll--h5" data-gallery="h5">
        <div class="works-scroll__item"><img src="assets/images/index-h5-1.png" alt="H5 home" loading="lazy"></div>
        <div class="works-scroll__item"><img src="assets/images/index-h5-1-3.png" alt="H5 home variant" loading="lazy"></div>
